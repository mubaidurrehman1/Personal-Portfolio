      (function () {
        var t = localStorage.getItem("portfolio-theme");
        if (
          t === "obsidian" ||
          t === "brutalist" ||
          t === "kinetic" ||
          t === "noir"
        ) {
          document.documentElement.dataset.theme = t;
        }
      })();
    </script>
